name: CI Pipeline

on:
  push:
    branches:
      - master
      - main
    
  pull_request:
    branches:
      - master
      - main

jobs:
  backend-api-tests:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
        
      - name: Install Dependencies
        run: npm install

      - name: Run API Tests
        run: npm test